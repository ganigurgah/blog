<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Blog & Notlar</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --accent-color: #007bff;
            --hover-bg: #f1f3f5;
        }
        /* Koyu Tema Değişkenleri */
        [data-theme="dark"] {
            --bg-color: #1a1b1e;
            --sidebar-bg: #25262b;
            --text-color: #c1c2c5;
            --border-color: #373a40;
            --accent-color: #4dabf7;
            --hover-bg: #2c2e33;
        }
        #theme-toggle-btn:hover {
            background-color: var(--hover-bg);
        }
        /* Koyu modda sağ taraftaki makale alanının arka planını koyu yapmak için */
        [data-theme="dark"] #content-area {
            background: #1a1b1e;
        }

        /* Koyu modda Markdown içindeki satır içi (inline) kod blokları */
        [data-theme="dark"] .inner-content :not(pre) > code {
            background: #2c2e33;
            color: #4dabf7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; height: 100vh; color: var(--text-color); background-color: var(--bg-color); }

        /* Sol Panel (Sidebar) */
        #sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .search-box { padding: 15px; border-bottom: 1px solid var(--border-color); }
        .search-box input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; outline: none; }
        .search-box input:focus { border-color: var(--accent-color); }

        .nav-controls { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; background: var(--bg-color); border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .btn-back { padding: 4px 8px; background: var(--sidebar-bg); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; }
        .btn-back:disabled { opacity: 0.5; cursor: not-allowed; }

        .list-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        .list-item { padding: 10px 20px; display: flex; align-items: center; cursor: pointer; transition: background 0.2s; font-size: 14px; }
        .list-item:hover { background: var(--hover-bg); }
        .list-item .icon { margin-right: 10px; font-size: 16px; }
        .list-item.directory { font-weight: 600; color: #495057; }

        /* Sağ İçerik Alanı */
        #content-area { flex: 1; overflow-y: auto; padding: 40px; background: #ffffff; display: flex; justify-content: center; }
        .inner-content { max-width: 800px; width: 100%; line-height: 1.6; font-size: 16px; }

        /* Markdown İçerik Stilleri */
        .inner-content h1, .inner-content h2, .inner-content h3 { margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        .inner-content p { margin-bottom: 16px; }
        .inner-content code { background: var(--hover-bg); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .inner-content pre { background: #212529; color: #f8f9fa; padding: 15px; border-radius: 6px; overflow-x: auto; margin-bottom: 16px; }
        .inner-content pre code { background: transparent; color: inherit; padding: 0; }

        /* Iframe Stili (HTML dosyaları için) */
        #html-frame { width: 100%; height: 100%; border: none; }
        .frame-wrapper { width: 100%; height: 100%; display: none; flex: 1; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="theme-control-wrapper" style="padding: 10px 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: flex-start; font-size: 13px;">
        <span></span>
        <button id="theme-toggle-btn" style="background: none; border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-color); transition: background 0.2s;">
            <span id="theme-icon">🌓</span>
            <span id="theme-text"></span>
        </button>
    </div>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Dosya veya klasör ara...">
    </div>
    <div class="nav-controls">
        <span id="current-path">Kök Dizin</span>
        <button id="btn-back" class="btn-back" disabled>Üst Dizin</button>
    </div>
    <div id="list-container" class="list-container">
    </div>
</div>

<div id="content-area">
    <div id="md-wrapper" class="inner-content">
        <h1>Hoş Geldiniz</h1>
        <p>Lütfen okumak istediğiniz bir dökümanı soldaki panelden seçin.</p>
    </div>
    <div id="frame-wrapper" class="frame-wrapper">
        <iframe id="html-frame"></iframe>
    </div>
</div>

<script>
    let allFiles = [];
    let currentPath = "contents";
    const dirHistory = [];

    const listContainer = document.getElementById('list-container');
    const searchInput = document.getElementById('search-input');
    const currentPathLabel = document.getElementById('current-path');
    const btnBack = document.getElementById('btn-back');
    const mdWrapper = document.getElementById('md-wrapper');
    const frameWrapper = document.getElementById('frame-wrapper');
    const htmlFrame = document.getElementById('html-frame');

    // 1. Uygulama Başlangıcı
    async function initBlog() {
        try {
            mdWrapper.innerHTML = '<p>İçerik yapısı yükleniyor...</p>';

            // GitHub API yerine kendi ürettiğimiz statik tree.json dosyasını çekiyoruz
            const response = await fetch('tree.json');
            if (!response.ok) throw new Error("tree.json bulunamadı veya yüklenemedi.");

            const data = await response.json();

            // Gelen veriyi formatla
            allFiles = data.map((item, index) => ({
                id: index + 1,
                name: item.name,
                path: item.path,
                type: 'file',
                content: null
            }));

            renderDirectory();

            // İlk açılışta ekrana basacak bir şey seç
            if (allFiles.length > 0) {
                const rootFiles = allFiles.filter(f => f.path.substring(0, f.path.lastIndexOf('/')) === 'contents');
                if (rootFiles.length > 0) {
                    loadFile(rootFiles[0]);
                } else {
                    loadFile(allFiles[0]);
                }
            } else {
                mdWrapper.innerHTML = `<h1>Boş</h1><p>contents/ dizini altında uygun dosya bulunamadı.</p>`;
            }
        } catch (error) {
            mdWrapper.innerHTML = `<h1>Hata</h1><p>Dizin yapısı yüklenemedi: ${error.message}</p>`;
        }
    }

    // 2. Arayüzü Listeleme
    function renderDirectory(searchResultItems = null) {
        listContainer.innerHTML = '';
        const isSearching = searchResultItems !== null;

        btnBack.disabled = dirHistory.length === 0 || isSearching;
        currentPathLabel.textContent = isSearching ? "Arama Sonuçları" : (currentPath === 'contents' ? 'Kök Dizin' : currentPath.replace("contents/", ""));

        const items = isSearching ? searchResultItems : getItemsInCurrentPath();

        if (!items || items.length === 0) {
            listContainer.innerHTML = '<div class="list-item" style="color: #888; padding-left:20px;">Sonuç bulunamadı...</div>';
            return;
        }

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `list-item ${item.type}`;

            const icon = item.type === 'directory' ? '📁' : (item.name.endsWith('.md') ? '📝' : '🌐');
            div.innerHTML = `<span class="icon">${icon}</span> <span>${item.name}</span>`;

            div.addEventListener('click', () => {
                if (item.type === 'directory') {
                    dirHistory.push(currentPath);
                    currentPath = item.path;
                    renderDirectory();
                } else {
                    loadFile(item);
                }
            });

            listContainer.appendChild(div);
        });
    }

    // Klasör ağacı süzme mantığı düzeltildi
    function getItemsInCurrentPath() {
        const result = [];
        const uniqueSubDirs = new Set();

        allFiles.forEach(f => {
            const fileDir = f.path.substring(0, f.path.lastIndexOf('/'));

            if (fileDir === currentPath) {
                result.push(f);
            } else if (f.path.startsWith(currentPath + '/')) {
                const relativePath = f.path.substring(currentPath.length + 1);
                const nextSlug = relativePath.split('/')[0];
                const subDirPath = currentPath + '/' + nextSlug;

                if (!uniqueSubDirs.has(subDirPath)) {
                    uniqueSubDirs.add(subDirPath);
                    result.push({
                        name: nextSlug,
                        path: subDirPath,
                        type: 'directory'
                    });
                }
            }
        });

        return result.sort((a, b) => {
            if (a.type === b.type) return a.name.localeCompare(b.name);
            return a.type === 'directory' ? -1 : 1;
        });
    }

    // 3. Dosya İçeriğini Okuma
    async function loadFile(fileObj) {
        try {
            // Alt klasör projesi (Project Pages) uyumu için URL rotası güvenli hale getirildi
            const basePath = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
            const cleanBasePath = basePath.replace('index.html', '');
            const targetUrl = window.location.origin + cleanBasePath + fileObj.path;

            if (!fileObj.content) {
                if (fileObj.path.endsWith('.md')) {
                    frameWrapper.style.display = 'none';
                    mdWrapper.style.display = 'block';
                    mdWrapper.innerHTML = '<p>Yükleniyor...</p>';

                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error("HTTP " + response.status);
                    const text = await response.text();

                    fileObj.content = marked.parse(text);
                    mdWrapper.innerHTML = fileObj.content;
                } else if (fileObj.path.endsWith('.html')) {
                    fileObj.content = targetUrl;
                    mdWrapper.style.display = 'none';
                    frameWrapper.style.display = 'flex';
                    htmlFrame.src = fileObj.content;
                }
            } else {
                if (fileObj.path.endsWith('.md')) {
                    frameWrapper.style.display = 'none';
                    mdWrapper.style.display = 'block';
                    mdWrapper.innerHTML = fileObj.content;
                } else if (fileObj.path.endsWith('.html')) {
                    mdWrapper.style.display = 'none';
                    frameWrapper.style.display = 'flex';
                    htmlFrame.src = fileObj.content;
                }
            }
        } catch (error) {
            mdWrapper.style.display = 'block';
            frameWrapper.style.display = 'none';
            mdWrapper.innerHTML = `<h1>Hata</h1><p>Dosya yüklenemedi: ${error.message}</p>`;
        }
    }

    // 4. Üst Dizin Kontrolü
    btnBack.addEventListener('click', () => {
        if (dirHistory.length > 0) {
            currentPath = dirHistory.pop();
            renderDirectory();
        }
    });

    // 5. Incremental Search
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (query === '') {
            renderDirectory();
            return;
        }

        const filteredResults = allFiles.filter(f => f.name.toLowerCase().includes(query));
        renderDirectory(filteredResults);
    });

    // --- TEMA YÖNETİMİ (BUTON VE İKON DÖNGÜSÜ) ---
    const themeToggleBtn = document.getElementById('theme-toggle-btn');
    const themeIcon = document.getElementById('theme-icon');
    const themeText = document.getElementById('theme-text');

    // Temalar arası geçiş sıralaması (Döngü)
    const themeCycle = ['light', 'dark', 'system'];

    // Her temanın arayüzdeki görsel karşılıkları
    const themeMetadata = {
        light: { icon: '☀️', label: '' },
        dark: { icon: '🌙', label: '' },
        system: { icon: '🌓', label: '' }
    };

    function applyTheme(theme) {
        let targetTheme = theme;

        if (theme === 'system') {
            const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            targetTheme = isDarkMode ? 'dark' : 'light';
        }

        // HTML root etiketine temayı bas
        document.documentElement.setAttribute('data-theme', targetTheme);

        // Butonun içindeki ikon ve metni güncelle (Kullanıcı o an hangi modun aktif olduğunu görsün)
        themeIcon.textContent = themeMetadata[theme].icon;
        themeText.textContent = themeMetadata[theme].label;

        // Eğer sağda iframe varsa onu da besle
        if (htmlFrame && htmlFrame.contentWindow) {
            try {
                htmlFrame.contentWindow.document.documentElement.setAttribute('data-theme', targetTheme);
            } catch(e) {}
        }
    }

    // Butona tıklandığında bir sonraki temaya geç
    themeToggleBtn.addEventListener('click', () => {
        const currentTheme = localStorage.getItem('saved-theme') || 'system';

        // Mevcut temanın index'ini bul ve bir sonrakine geç (Döngü bozulursa diye fallback sıfır)
        let currentIndex = themeCycle.indexOf(currentTheme);
        let nextIndex = (currentIndex + 1) % themeCycle.length;
        const nextTheme = themeCycle[nextIndex];

        localStorage.setItem('saved-theme', nextTheme);
        applyTheme(nextTheme);
    });

    // Sistem teması arka planda değişirse (Örn: Gece modu tetiklenirse) anlık takip et
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        const currentTheme = localStorage.getItem('saved-theme') || 'system';
        if (currentTheme === 'system') {
            applyTheme('system');
        }
    });

    // İlk yükleme
    function initTheme() {
        const savedTheme = localStorage.getItem('saved-theme') || 'system';
        applyTheme(savedTheme);
    }

    initTheme();

    initBlog();
</script>
</body>
</html>
